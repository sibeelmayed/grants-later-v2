name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run scripts (if present)
        run: |
          node - <<'NODE'
          const { execSync } = require('node:child_process');
          const pkg = require('./package.json');
          const scripts = pkg.scripts || {};
          const order = ['lint', 'typecheck', 'test', 'build'];
          for (const name of order) {
            if (scripts[name]) {
              console.log(`Running: npm run -s ${name}`);
              execSync(`npm run -s ${name}`, { stdio: 'inherit' });
            } else {
              console.log(`Skipping: ${name} (no script)`);
            }
          }
          NODE
